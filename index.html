<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STATISTIKA REAKCÍ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #00ff41;
            --neon-blue: #00d4ff;
            --neon-red: #ff3131;
            --dark-bg: #0d1117;
            --card-bg: #161b22;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: #161b22;
            border-bottom: 2px solid var(--neon-blue);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 10px;
            margin: 0;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            padding: 20px;
            flex-grow: 1;
        }

        .main-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover { transform: translateY(-5px); border-color: var(--neon-blue); }

        .card h3 { margin: 0; color: #8b949e; font-size: 14px; text-transform: uppercase; }

        .card .value {
            font-size: 40px;
            font-weight: 700;
            margin: 10px 0;
            font-family: 'Orbitron', sans-serif;
        }

        #lastTime { color: white; }
        #avgTime { color: var(--neon-blue); }
        #fastestTime { color: var(--neon-green); }
        #slowestTime { color: var(--neon-red); }

        .chart-section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #30363d;
            height: 350px;
        }

        .btn-connect {
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
        }

        .live-dot {
            height: 10px; width: 10px; background: var(--neon-green);
            border-radius: 50%; display: inline-block; margin-right: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>STATISTIKA</h1>
    <button class="btn-connect" id="connectBtn">PŘIPOJIT TRENAŽÉR</button>
</header>

<div class="container">
    <div class="main-stats">
        <div class="card">
            <h3>Poslední</h3>
            <div class="value" id="lastTime">0</div>
            <span>ms</span>
        </div>
        <div class="card">
            <h3>Průměr</h3>
            <div class="value" id="avgTime">0</div>
            <span>ms</span>
        </div>
        <div class="card">
            <h3>Nejrychlejší</h3>
            <div class="value" id="fastestTime">0</div>
            <span>ms</span>
        </div>
        <div class="card">
            <h3>Nejpomalejší</h3>
            <div class="value" id="slowestTime">0</div>
            <span>ms</span>
        </div>
    </div>

    <div class="chart-section">
        <canvas id="reactionChart"></canvas>
    </div>
</div>

<script>
    let times = [];
    let best = Infinity;
    let worst = 0;
    let lineBuffer = "";

    const ctx = document.getElementById('reactionChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#00d4ff',
                backgroundColor: 'rgba(0, 212, 255, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: '#333' }, ticks: { color: '#888' } },
                x: { display: false }
            }
        }
    });

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            document.getElementById('connectBtn').innerHTML = '<span class="live-dot"></span>SYSTÉM AKTIVNÍ';
            
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                lineBuffer += value;
                let lines = lineBuffer.split("\n");
                lineBuffer = lines.pop();

                for (let line of lines) {
                    if (line.includes("TIME:")) {
                        let rawVal = line.split(":")[1];
                        let val = parseInt(rawVal);
                        
                        // FILTR: Ignoruj nesmysly pod 100ms a nad 5000ms
                        if (!isNaN(val) && val > 100 && val < 5000) {
                            updateStats(val);
                        }
                    }
                }
            }
        } catch (e) { console.log("Chyba:", e); }
    });

    function updateStats(val) {
        document.getElementById('lastTime').innerText = val;
        times.push(val);
        
        if (val < best) best = val;
        if (val > worst) worst = val;
        
        const avg = Math.round(times.reduce((a, b) => a + b) / times.length);

        document.getElementById('fastestTime').innerText = best;
        document.getElementById('slowestTime').innerText = worst;
        document.getElementById('avgTime').innerText = avg;

        chart.data.labels.push("");
        chart.data.datasets[0].data.push(val);
        if (chart.data.datasets[0].data.length > 20) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.update();
    }
</script>
</body>
</html>

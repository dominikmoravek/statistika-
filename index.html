<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>STATISTIKA REAKCÍ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; text-align: center; margin: 0; }
        header { padding: 30px; border-bottom: 1px solid #30363d; }
        h1 { font-family: 'Orbitron'; letter-spacing: 10px; margin: 0; color: var(--blue); }
        .stats-row { display: flex; justify-content: center; gap: 20px; padding: 40px 20px; flex-wrap: wrap; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; min-width: 180px; }
        .label { color: #8b949e; font-size: 14px; text-transform: uppercase; }
        .value { font-family: 'Orbitron'; font-size: 40px; margin: 10px 0; }
        #val-last { color: #fff; } #val-avg { color: var(--blue); } #val-fast { color: var(--green); } #val-slow { color: var(--red); }
        .btn { background: var(--blue); color: black; border: none; padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; border-radius: 5px; font-weight: bold; margin: 20px; }
        #debug { color: #555; font-size: 12px; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <h1>REACTION STATS</h1>
        <button class="btn" id="connect">PŘIPOJIT ZAŘÍZENÍ</button>
    </header>

    <div class="stats-row">
        <div class="card"><div class="label">Poslední</div><div class="value" id="val-last">0</div>ms</div>
        <div class="card"><div class="label">Průměr</div><div class="value" id="val-avg">0</div>ms</div>
        <div class="card"><div class="label">Nejrychlejší</div><div class="value" id="val-fast">0</div>ms</div>
        <div class="card"><div class="label">Nejpomalejší</div><div class="value" id="val-slow">0</div>ms</div>
    </div>

    <div id="debug">Čekám na připojení...</div>

    <script>
        let lineBuffer = "";
        const debug = document.getElementById('debug');

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('connect').innerText = "✅ PROPOJENO";
                debug.innerText = "Naslouchám datům z Micro:bitu...";
                
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    lineBuffer += value;
                    debug.innerText = "Raw data: " + lineBuffer; // Tady uvidíš, co chodí

                    if (lineBuffer.includes("\n")) {
                        let parts = lineBuffer.split("\n");
                        for (let i = 0; i < parts.length - 1; i++) {
                            processLine(parts[i].trim());
                        }
                        lineBuffer = parts[parts.length - 1];
                    }
                }
            } catch (err) {
                debug.innerText = "Chyba: " + err;
            }
        });

        function processLine(line) {
            console.log("Zpracovávám:", line);
            if (line.startsWith("FINAL:")) {
                let raw = line.replace("FINAL:", "");
                let data = raw.split(",");
                if (data.length === 4) {
                    document.getElementById('val-last').innerText = data[0];
                    document.getElementById('val-avg').innerText = data[1];
                    document.getElementById('val-fast').innerText = data[2];
                    document.getElementById('val-slow').innerText = data[3];
                    debug.innerText = "Data úspěšně aktualizována!";
                }
            }
        }
    </script>
</body>
</html>

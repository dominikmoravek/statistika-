<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>REACTION DASHBOARD Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 50px; }
        header { padding: 20px; border-bottom: 1px solid #30363d; text-align: center; }
        h1 { font-family: 'Orbitron'; letter-spacing: 5px; color: var(--blue); margin: 0; }
        
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .stats-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 12px; flex: 1; text-align: center; }
        .label { color: #8b949e; font-size: 12px; text-transform: uppercase; }
        .value { font-family: 'Orbitron'; font-size: 32px; margin: 5px 0; }
        
        #val-last { color: #fff; } #val-avg { color: var(--blue); } 
        #val-fast { color: var(--green); } #val-slow { color: var(--red); }

        .main-content { display: flex; gap: 20px; align-items: flex-start; }
        .chart-container { background: var(--card); border: 1px solid #30363d; padding: 20px; border-radius: 12px; flex: 2; height: 300px; }
        
        /* Vizualizace LED */
        .led-display { background: var(--card); border: 1px solid #30363d; padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .led-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 120px; margin: 20px auto; }
        .led-dot { width: 40px; height: 40px; background: #333; border-radius: 50%; border: 2px solid #444; transition: 0.3s; }
        .led-dot.active-bad { background: var(--red); box-shadow: 0 0 20px var(--red); border-color: #ffcccc; }
        
        .btn { background: var(--blue); color: black; border: none; padding: 12px 25px; cursor: pointer; font-family: 'Orbitron'; border-radius: 5px; font-weight: bold; margin: 10px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
        #debug { color: #444; font-size: 11px; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <h1>REACTION DASHBOARD</h1>
        <button class="btn" id="connect">PŘIPOJIT MICRO:BIT</button>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="card"><div class="label">Poslední</div><div class="value" id="val-last">0</div>ms</div>
            <div class="card"><div class="label">Průměr</div><div class="value" id="val-avg">0</div>ms</div>
            <div class="card"><div class="label">Nejrychlejší</div><div class="value" id="val-fast">0</div>ms</div>
            <div class="card"><div class="label">Nejpomalejší</div><div class="value" id="val-slow">0</div>ms</div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>

            <div class="led-display">
                <div class="label">Nejpomalejší LED</div>
                <div class="led-grid">
                    <div class="led-dot" id="led-0"></div>
                    <div class="led-dot" id="led-1"></div>
                    <div class="led-dot" id="led-2"></div>
                    <div class="led-dot" id="led-3"></div>
                </div>
                <div id="bad-led-text" style="font-size: 12px; color: #8b949e;">--</div>
            </div>
        </div>
        <div id="debug">Status: Odpojeno</div>
    </div>

    <script>
        let lineBuffer = "";
        let history = [];
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Reakce (ms)', data: [], borderColor: '#00d4ff', tension: 0.4, fill: true, backgroundColor: 'rgba(0, 212, 255, 0.1)' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { grid: { color: '#222' } }, x: { display: false } } }
        });

        document.getElementById('connect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('connect').innerText = "✅ ONLINE";
                
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    lineBuffer += value;
                    if (lineBuffer.includes("\n")) {
                        let lines = lineBuffer.split("\n");
                        for (let i = 0; i < lines.length - 1; i++) processLine(lines[i].trim());
                        lineBuffer = lines[lines.length - 1];
                    }
                }
            } catch (err) { console.error(err); }
        });

        function processLine(line) {
            document.getElementById('debug').innerText = "Last RX: " + line;
            // Zpracování průběžných dat pro graf (nepovinné, ale hezké)
            if (line.startsWith("LIVE:")) {
                let val = parseInt(line.split(":")[1]);
                updateChart(val);
            }
            // Zpracování finálních statistik
            if (line.startsWith("FINAL:")) {
                let data = line.replace("FINAL:", "").split(",");
                // Pořadí: poslední, průměr, nejrychlejší, nejpomalejší, ID špatné LED
                document.getElementById('val-last').innerText = data[0];
                document.getElementById('val-avg').innerText = data[1];
                document.getElementById('val-fast').innerText = data[2];
                document.getElementById('val-slow').innerText = data[3];
                
                showBadLed(parseInt(data[4]));
            }
        }

        function updateChart(val) {
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(val);
            if (chart.data.datasets[0].data.length > 10) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.update();
        }

        function showBadLed(id) {
            for (let i = 0; i < 4; i++) document.getElementById('led-' + i).classList.remove('active-bad');
            if (id >= 0 && id <= 3) {
                document.getElementById('led-' + id).classList.add('active-bad');
                document.getElementById('bad-led-text').innerText = "LED pozice: " + (id + 1);
            }
        }
    </script>
</body>
</html>

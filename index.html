<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Reaction System Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0d1117; color: #e6edf3; font-family: sans-serif; text-align: center; margin: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .grid { display: flex; gap: 15px; justify-content: center; margin: 20px 0; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; flex: 1; }
        .val { font-size: 2em; font-weight: bold; color: #58a6ff; display: block; }
        .label { font-size: 0.8em; color: #8b949e; text-transform: uppercase; }
        
        #chart-container { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 10px; height: 300px; margin-top: 20px; }
        
        .led-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100px; margin: 20px auto; }
        .led { width: 40px; height: 40px; background: #21262d; border: 2px solid #30363d; border-radius: 5px; }
        .led.bad { background: #f85149; box-shadow: 0 0 15px #f85149; border-color: #ff7b72; }
        
        button { background: #238636; color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #2ea043; }
        #debug { font-family: monospace; color: #8b949e; font-size: 0.7em; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>REACTION DASHBOARD</h1>
        <button id="btnConnect">PŘIPOJIT MICRO:BIT</button>

        <div class="grid">
            <div class="card"><span class="label">Poslední</span><span id="vLast" class="val">0</span>ms</div>
            <div class="card"><span class="label">Průměr</span><span id="vAvg" class="val">0</span>ms</div>
            <div class="card"><span class="label">Nejrychlejší</span><span id="vMin" class="val" style="color:#3fb950">0</span>ms</div>
            <div class="card"><span class="label">Nejpomalejší</span><span id="vMax" class="val" style="color:#f85149">0</span>ms</div>
        </div>

        <div style="display:flex; gap:20px;">
            <div id="chart-container" style="flex:3;">
                <canvas id="reactionChart"></canvas>
            </div>
            <div class="card" style="flex:1;">
                <span class="label">Nejhorší LED</span>
                <div class="led-grid">
                    <div id="l0" class="led"></div><div id="l1" class="led"></div>
                    <div id="l2" class="led"></div><div id="l3" class="led"></div>
                </div>
                <span id="ledDesc" style="font-size:0.8em; color:#8b949e;">---</span>
            </div>
        </div>
        <div id="debug">Status: Čekám na připojení...</div>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('reactionChart').getContext('2d');

        // Inicializace grafu (začíná v nule)
        chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: [1,2,3,4,5,6,7,8], 
                datasets: [{ label: 'Reakce (ms)', data: [], borderColor: '#58a6ff', tension: 0.2, fill: true, backgroundColor: 'rgba(88, 166, 255, 0.1)' }] 
            },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, min: 0 } } }
        });

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('btnConnect').innerText = "✅ PŘIPOJENO";
                
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    if (buffer.includes("\n")) {
                        let lines = buffer.split("\n");
                        processLine(lines[lines.length - 2]); 
                        buffer = lines[lines.length - 1];
                    }
                }
            } catch (err) { document.getElementById('debug').innerText = "Chyba: " + err; }
        });

        function processLine(line) {
            let clean = line.trim();
            document.getElementById('debug').innerText = "Poslední data: " + clean;
            if (!clean.startsWith("DATA:")) return;

            let mainParts = clean.replace("DATA:", "").split("|");
            let stats = mainParts[0].split(",").map(Number);
            let reactions = mainParts[1].split(",").filter(x => x !== "").map(Number);

            // 1. Naplnění statistik
            document.getElementById('vLast').innerText = stats[0];
            document.getElementById('vAvg').innerText = stats[1];
            document.getElementById('vMin').innerText = stats[2];
            document.getElementById('vMax').innerText = stats[3];

            // 2. LED vizualizace
            for(let i=0; i<4; i++) document.getElementById('l'+i).className = 'led';
            let badId = stats[4];
            document.getElementById('l'+badId).className = 'led bad';
            document.getElementById('ledDesc').innerText = "LED Pozice " + (badId + 1);

            // 3. Graf
            chart.data.datasets[0].data = reactions;
            chart.update();
        }
    </script>
</body>
</html>

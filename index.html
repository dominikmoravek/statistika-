<script>
    let times = [];
    let best = Infinity;
    let worst = 0;
    let lineBuffer = "";

    const ctx = document.getElementById('reactionChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#00d4ff',
                backgroundColor: 'rgba(0, 212, 255, 0.05)',
                borderWidth: 3,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b949e' } },
                x: { display: false }
            }
        }
    });

    document.getElementById('connectBtn').addEventListener('click', async () => {
        try {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            document.getElementById('connectBtn').innerHTML = '<span class="live-dot"></span>PROPOJENO';
            document.getElementById('connectBtn').style.borderColor = 'var(--neon-green)';
            document.getElementById('connectBtn').style.color = 'var(--neon-green)';

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                processData(value);
            }
        } catch (e) { console.error(e); }
    });

    function processData(chunk) {
        lineBuffer += chunk;
        // Rozdělení podle konců řádků
        let lines = lineBuffer.split(/\r?\n/);
        
        // Poslední prvek si necháme, může být neúplný
        lineBuffer = lines.pop();

        lines.forEach(line => {
            line = line.trim();
            // Hledáme přesně formát TIME:číslo
            if (line.startsWith('TIME:')) {
                let parts = line.split(':');
                if (parts.length === 2) {
                    let val = parseInt(parts[1]);
                    
                    // --- POJISTKA PROTI NESMYSLŮM ---
                    // Ignorujeme časy pod 100ms a nad 5000ms
                    if (!isNaN(val) && val > 100 && val < 5000) {
                        updateStats(val);
                    }
                }
            }
        });
    }

    function updateStats(val) {
        document.getElementById('lastTime').innerText = val;
        times.push(val);
        
        // Update rekordů
        if (val < best) best = val;
        if (val > worst) worst = val;
        
        const avg = Math.round(times.reduce((a, b) => a + b) / times.length);

        document.getElementById('fastestTime').innerText = best;
        document.getElementById('slowestTime').innerText = worst;
        document.getElementById('avgTime').innerText = avg;

        // Graf
        chart.data.labels.push("");
        chart.data.datasets[0].data.push(val);
        if (chart.data.datasets[0].data.length > 25) {
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }
        chart.update('none'); // 'none' zrychluje vykreslování
    }
</script>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Reaction System Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #58a6ff; --green: #3fb950; --red: #f85149; --bg: #0d1117; --card: #161b22; --border: #30363d; }
        body { background: var(--bg); color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        
        button { background: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); padding: 12px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        button:hover { background: #2ea043; }

        .grid { display: flex; gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 15px; flex: 1; min-width: 150px; }
        .label { display: block; font-size: 12px; color: #8b949e; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        .val { font-size: 28px; font-family: monospace; font-weight: bold; color: var(--blue); }

        .main-layout { display: flex; gap: 20px; }
        .chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; flex: 3; height: 350px; }
        .led-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .led-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .led { width: 50px; height: 50px; background: #21262d; border: 2px solid var(--border); border-radius: 8px; transition: 0.3s; }
        .led.bad { background: var(--red); box-shadow: 0 0 20px var(--red); border-color: #ff7b72; }

        #debug { margin-top: 30px; font-family: monospace; font-size: 11px; color: #8b949e; border-top: 1px solid var(--border); padding-top: 10px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h1>REACTION DASHBOARD</h1>
        <button id="btnConnect">PŘIPOJIT MICRO:BIT</button>

        <div class="grid">
            <div class="card"><span class="label">Poslední kolo</span><span id="vLast" class="val">--</span></div>
            <div class="card"><span class="label">Průměr</span><span id="vAvg" class="val">--</span></div>
            <div class="card"><span class="label">Nejrychlejší</span><span id="vMin" class="val" style="color:var(--green)">--</span></div>
            <div class="card"><span class="label">Nejpomalejší</span><span id="vMax" class="val" style="color:var(--red)">--</span></div>
        </div>

        <div class="main-layout">
            <div class="chart-box">
                <canvas id="myChart"></canvas>
            </div>
            <div class="led-box">
                <span class="label">Nejpomalejší LED</span>
                <div class="led-grid">
                    <div id="l0" class="led"></div><div id="l1" class="led"></div>
                    <div id="l2" class="led"></div><div id="l3" class="led"></div>
                </div>
                <span id="ledDesc" style="color:var(--red); font-weight:bold; font-size:14px;">ČEKÁM NA DATA</span>
            </div>
        </div>

        <div id="debug">Poslední RAW data: Čekám na spárování...</div>
    </div>

    <script>
        let chart;
        const ctx = document.getElementById('myChart').getContext('2d');

        // Nastavení grafu
        chart = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: ['1','2','3','4','5','6','7','8'], 
                datasets: [{ label: 'ms', data: [], borderColor: '#58a6ff', tension: 0.3, fill: true, backgroundColor: 'rgba(88, 166, 255, 0.1)', borderWidth: 3 }] 
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { 
                    y: { beginAtZero: true, min: 0, grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                document.getElementById('btnConnect').innerText = "✅ PŘIPOJENO";
                
                const decoder = new TextDecoderStream();
                port.readable.pipeTo(decoder.writable);
                const reader = decoder.readable.getReader();
                let buffer = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    buffer += value;
                    if (buffer.includes("\n")) {
                        let lines = buffer.split("\n");
                        for (let i = 0; i < lines.length - 1; i++) {
                            if (lines[i].trim()) processLine(lines[i].trim());
                        }
                        buffer = lines[lines.length - 1];
                    }
                }
            } catch (err) { document.getElementById('debug').innerText = "Chyba: " + err; }
        });

        function processLine(line) {
            document.getElementById('debug').innerText = "Poslední RAW data: " + line;
            if (!line.includes("DATA:")) return;

            try {
                // Rozsekání řádku přesně podle toho, co posílá Micro:bit
                let dataPart = line.split("DATA:")[1].trim();
                let sections = dataPart.split("|");
                if (sections.length < 2) return;

                // Vyčištění čísel (odstraní prázdné hodnoty a čárky navíc)
                let stats = sections[0].split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n));
                let times = sections[1].split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n));

                if (stats.length >= 4) {
                    document.getElementById('vLast').innerText = stats[0] + " ms";
                    document.getElementById('vAvg').innerText = stats[1] + " ms";
                    document.getElementById('vMin').innerText = stats[2] + " ms";
                    document.getElementById('vMax').innerText = stats[3] + " ms";
                }

                if (stats.length >= 5) {
                    for(let i=0; i<4; i++) document.getElementById('l'+i).classList.remove('bad');
                    let badId = stats[4];
                    if (badId >= 0 && badId <= 3) {
                        document.getElementById('l'+badId).classList.add('bad');
                        document.getElementById('ledDesc').innerText = "POZICE LED " + (badId + 1);
                    }
                }

                if (times.length > 0) {
                    chart.data.datasets[0].data = times;
                    chart.update();
                }
            } catch (e) { console.error("Chyba:", e); }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>STATISTIKA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #00d4ff; --green: #00ff41; --red: #ff3131; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; text-align: center; margin: 0; }
        header { padding: 30px; border-bottom: 1px solid #30363d; animation: fadeIn 1s; }
        h1 { font-family: 'Orbitron'; letter-spacing: 10px; margin: 0; }
        .stats-row { display: flex; justify-content: center; gap: 20px; padding: 40px 20px; animation: fadeIn 1.5s; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 12px; min-width: 200px; transition: 0.3s; }
        .card:hover { border-color: var(--blue); transform: translateY(-5px); }
        .label { color: #8b949e; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-family: 'Orbitron'; font-size: 40px; margin: 15px 0; }
        #val-last { color: white; } #val-avg { color: var(--blue); } #val-fast { color: var(--green); } #val-slow { color: var(--red); }
        .btn { background: transparent; color: var(--blue); border: 2px solid var(--blue); padding: 15px 30px; cursor: pointer; font-family: 'Orbitron'; border-radius: 5px; margin-top: 20px; }
        .btn:hover { background: var(--blue); color: black; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <header>
        <h1>STATISTIKA</h1>
        <button class="btn" id="connect">PŘIPOJIT MICRO:BIT</button>
    </header>
    <div class="stats-row">
        <div class="card"><div class="label">Poslední</div><div class="value" id="val-last">0</div>ms</div>
        <div class="card"><div class="label">Průměr</div><div class="value" id="val-avg">0</div>ms</div>
        <div class="card"><div class="label">Nejrychlejší</div><div class="value" id="val-fast">0</div>ms</div>
        <div class="card"><div class="label">Nejpomalejší</div><div class="value" id="val-slow">0</div>ms</div>
    </div>

    <script>
        let lineBuffer = "";
        document.getElementById('connect').addEventListener('click', async () => {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            document.getElementById('connect').innerText = "PROPOJENO";
            
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                lineBuffer += value;
                let lines = lineBuffer.split("\n");
                lineBuffer = lines.pop();

                for (let line of lines) {
                    if (line.trim().startsWith("FINAL:")) {
                        let data = line.trim().split(":")[1].split(",");
                        // Přesné propsání hodnot z Micro:bitu
                        document.getElementById('val-last').innerText = data[0];
                        document.getElementById('val-avg').innerText = data[1];
                        document.getElementById('val-fast').innerText = data[2];
                        document.getElementById('val-slow').innerText = data[3];
                    }
                }
            }
        });
    </script>
</body>
</html>
